name: Build Native Flutter APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.24.3' # Pinning a recent stable version to prevent cloud breakages

    - name: Cloud Generate Flutter Project
      run: |
        flutter create gyroad_native
        cp main.dart gyroad_native/lib/main.dart

    - name: Build APK
      working-directory: ./gyroad_native
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gyroad-native-apk
        path: gyroad_native/build/app/outputs/flutter-apk/app-release.apk
